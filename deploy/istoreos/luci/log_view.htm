<%-
local uci = require "luci.model.uci".cursor()
-%>

<div class="cbi-section">
	<div class="cbi-section-node">
		<textarea id="qwenpaw_log_area"
			style="width:100%;height:300px;font-family:'Courier New',monospace;font-size:12px;background:#1e1e1e;color:#d4d4d4;border:1px solid #444;border-radius:4px;padding:8px;resize:vertical" readonly></textarea>
		<div style="margin-top:8px;display:flex;gap:8px;align-items:center">
			<button class="cbi-button cbi-button-apply" onclick="qwenpawRefreshLog()">🔄 刷新</button>
			<button class="cbi-button cbi-button-reset" onclick="qwenpawClearLog()">🗑️ 清空</button>
			<span id="qwenpaw_log_status" style="font-size:12px;color:#999">就绪</span>
		</div>
	</div>
</div>

<script type="text/javascript">
//<![CDATA[
var qwenpaw_log_url = '<%=luci.dispatcher.build_url("admin","services","qwenpaw","log")%>';

function qwenpawRefreshLog() {
	var area = document.getElementById('qwenpaw_log_area');
	var status = document.getElementById('qwenpaw_log_status');
	status.textContent = '加载中...';
	var xhr = new XMLHttpRequest();
	xhr.onreadystatechange = function() {
		if (xhr.readyState == 4) {
			if (xhr.status == 200) {
				try {
					var r = JSON.parse(xhr.responseText);
					if (r.log) { area.value = r.log; area.scrollTop = area.scrollHeight; }
					var lines = r.log ? r.log.split('\n').length - 1 : 0;
					status.textContent = '已加载 ' + lines + ' 行 (' + new Date().toLocaleTimeString() + ')';
				} catch(e) { status.textContent = '解析失败'; }
			} else {
				status.textContent = '请求失败 (HTTP ' + xhr.status + ')';
			}
		}
	};
	xhr.open('GET', qwenpaw_log_url, true);
	xhr.send();
}

function qwenpawClearLog() {
	document.getElementById('qwenpaw_log_area').value = '';
	document.getElementById('qwenpaw_log_status').textContent = '已清空';
}

setTimeout(qwenpawRefreshLog, 500);
setInterval(qwenpawRefreshLog, 5000);
//]]>
</script>
